name: Merge main to beta

on:
  push:
    branches:
      - main

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        name: Merge main to beta
        with:
          ref: beta
          fetch-depth: 0
        run: |
          git checkout beta
          git merge main
          git push origin beta
